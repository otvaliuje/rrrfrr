<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkadaş Anketi</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .konteyner { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="konteyner">
        <h2>Anket</h2>
        <form action="/gonder" method="post">
            <label for="ad">Adın Soyadın:</label>
            <input type="text" id="ad" name="ad" required>
            
            <label for="dogum_tarihi">Doğum Tarihim cart curt всв:</label>
            <input type="date" id="dogum_tarihi" name="dogum_tarihi" required>
            
            <label for="hobiler">En Sevdiğim Şeyler (Hobilerim):</label>
            <textarea id="hobiler" name="hobiler" rows="4" required></textarea>
            
            <button type="submit">Gönder</button>
        </form>
    </div>
</body>
</html>
